<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-area p {
            color: #666;
            margin: 10px 0;
            font-size: 1.1em;
        }

        .upload-area .small {
            color: #999;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .settings {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .setting-group {
            flex: 1;
            min-width: 150px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-section {
            display: none;
            margin: 20px 0;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        .images-section {
            display: none;
            margin-top: 30px;
        }

        .images-section.show {
            display: block;
        }

        .images-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .images-header h2 {
            color: #333;
            font-size: 1.3em;
            flex: 1;
        }

        .download-all-btn {
            background: #28a745;
        }

        .download-all-btn:hover {
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .image-item {
            background: #f8f9fa;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .image-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .image-preview {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
            display: block;
        }

        .image-info {
            padding: 15px;
        }

        .image-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .image-actions {
            display: flex;
            gap: 8px;
        }

        .image-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85em;
            background: #667eea;
        }

        .image-actions button:nth-child(2) {
            background: #28a745;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info-msg {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ PDF to Image Converter</h1>
        
        <div class="info-msg">
            Chọn file PDF, cấu hình chất lượng & định dạng, sau đó nhấn "Chuyển đổi" để chuyển mỗi trang thành ảnh
        </div>

        <div class="error" id="error"></div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <p>📁 Kéo & thả file PDF tại đây</p>
                <p>hoặc</p>
                <p style="color: #667eea; font-weight: 600; cursor: pointer;">Nhấn để chọn file</p>
                <p class="small">Chỉ hỗ trợ file PDF</p>
            </div>
            <input type="file" id="fileInput" accept=".pdf" />
        </div>

        <div id="settingsArea" style="display: none;">
            <div class="settings">
                <div class="setting-group">
                    <label for="quality">Chất lượng (DPI):</label>
                    <input type="number" id="quality" value="150" min="72" max="300" step="10">
                </div>
                <div class="setting-group">
                    <label for="format">Định dạng:</label>
                    <select id="format">
                        <option value="png">PNG (Không mất chất lượng)</option>
                        <option value="jpg">JPG (Nhỏ gọn hơn)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="scale">Tỉ lệ:</label>
                    <input type="number" id="scale" value="2" min="1" max="4" step="0.5">
                </div>
            </div>
            <button id="convertBtn" style="width: 100%; margin-top: 20px;">⚡ Chuyển đổi</button>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Đang khởi tạo...</div>
        </div>

        <div class="images-section" id="imagesSection">
            <div class="images-header">
                <h2>✅ Chuyển đổi hoàn tất!</h2>
                <button class="download-all-btn" id="downloadAllBtn">📦 Tải tất cả</button>
            </div>
            <div class="images-grid" id="imagesGrid"></div>
        </div>
    </div>

    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Cấu hình PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const settingsArea = document.getElementById('settingsArea');
        const convertBtn = document.getElementById('convertBtn');
        const progressSection = document.getElementById('progressSection');
        const imagesSection = document.getElementById('imagesSection');
        const errorDiv = document.getElementById('error');
        let selectedFile = null;
        let images = [];

        // Upload area events
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file.type.includes('pdf')) {
                showError('Vui lòng chọn file PDF!');
                return;
            }
            selectedFile = file;
            uploadArea.innerHTML = `<p>✅ Đã chọn: <strong>${file.name}</strong></p><p class="small">Kích thước: ${(file.size / 1024 / 1024).toFixed(2)} MB</p>`;
            settingsArea.style.display = 'block';
            errorDiv.classList.remove('show');
        }

        convertBtn.addEventListener('click', convertPdfToImages);

        async function convertPdfToImages() {
            if (!selectedFile) {
                showError('Vui lòng chọn file PDF!');
                return;
            }

            convertBtn.disabled = true;
            progressSection.classList.add('show');
            imagesSection.classList.remove('show');
            images = [];
            errorDiv.classList.remove('show');

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const quality = parseInt(document.getElementById('quality').value);
                const scale = parseFloat(document.getElementById('scale').value);
                const format = document.getElementById('format').value;
                const totalPages = pdf.numPages;

                updateProgress(0, `Chuẩn bị chuyển đổi ${totalPages} trang...`);

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    try {
                        const page = await pdf.getPage(pageNum);
                        const viewport = page.getViewport({ scale: scale });
                        
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport,
                            background: 'rgb(255,255,255)'
                        };

                        await page.render(renderContext).promise;

                        const imageData = canvas.toDataURL(`image/${format}`, format === 'jpg' ? 0.95 : 1.0);
                        images.push({
                            data: imageData,
                            pageNum: pageNum,
                            filename: `${selectedFile.name.replace('.pdf', '')}_page_${pageNum}.${format}`
                        });

                        const progress = Math.round((pageNum / totalPages) * 100);
                        updateProgress(progress, `Đã xử lý: ${pageNum}/${totalPages} trang`);
                    } catch (error) {
                        console.error(`Lỗi xử lý trang ${pageNum}:`, error);
                        updateProgress(Math.round((pageNum / totalPages) * 100), `Lỗi trang ${pageNum}`);
                    }
                }

                displayImages();
                progressSection.classList.remove('show');
            } catch (error) {
                showError('Lỗi khi chuyển đổi PDF: ' + error.message);
                progressSection.classList.remove('show');
                console.error(error);
            } finally {
                convertBtn.disabled = false;
            }
        }

        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = text;
        }

        function displayImages() {
            const grid = document.getElementById('imagesGrid');
            grid.innerHTML = '';

            images.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'image-item';
                item.innerHTML = `
                    <img class="image-preview" src="${image.data}" alt="Trang ${image.pageNum}">
                    <div class="image-info">
                        <div class="image-title">Trang ${image.pageNum}</div>
                        <div class="image-actions">
                            <button onclick="previewImage(${index})">👁️ Xem</button>
                            <button onclick="downloadImage(${index})">⬇️ Tải</button>
                        </div>
                    </div>
                `;
                grid.appendChild(item);
            });

            imagesSection.classList.add('show');
        }

        function previewImage(index) {
            const image = images[index];
            const newWindow = window.open();
            newWindow.document.write(`
                <html>
                <head><title>Xem - Trang ${image.pageNum}</title></head>
                <body style="margin:0; padding:10px; background:#f0f0f0; display:flex; justify-content:center; align-items:center; min-height:100vh;">
                    <img src="${image.data}" style="max-width:100%; max-height:100%; border:1px solid #ddd; box-shadow: 0 0 10px rgba(0,0,0,0.3);">
                </body>
                </html>
            `);
        }

        function downloadImage(index) {
            const image = images[index];
            const link = document.createElement('a');
            link.href = image.data;
            link.download = image.filename;
            link.click();
        }

        document.getElementById('downloadAllBtn').addEventListener('click', downloadAllImages);

        function downloadAllImages() {
            // Nếu chỉ có 1 ảnh, tải trực tiếp
            if (images.length === 1) {
                downloadImage(0);
                return;
            }

            // Nếu có nhiều ảnh, cần check xem có JSZip không
            if (typeof JSZip === 'undefined') {
                // Tải JSZip library
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                script.onload = () => createZipAndDownload();
                document.head.appendChild(script);
            } else {
                createZipAndDownload();
            }
        }

        async function createZipAndDownload() {
            const JSZip = window.JSZip;
            const zip = new JSZip();
            
            images.forEach(image => {
                // Chuyển data URL thành blob
                const base64 = image.data.split(',')[1];
                zip.file(image.filename, base64, { base64: true });
            });

            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${selectedFile.name.replace('.pdf', '')}_images.zip`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to ZIP Converter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; text-align: center; background: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #drop-zone { border: 2px dashed #007bff; padding: 30px; cursor: pointer; margin-bottom: 20px; border-radius: 8px; background: #f8fbff; }
        
        .controls { display: none; background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
        
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        .btn-download-all { background: #28a745; color: white; }
        .btn-download-custom { background: #fd7e14; color: white; }
        button:hover { opacity: 0.8; }

        #output-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .page-item { border: 1px solid #eee; padding: 10px; background: #fafafa; border-radius: 5px; }
        canvas { width: 100%; height: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page-label { margin-top: 8px; font-size: 14px; color: #555; }
        
        .loading { color: #007bff; font-weight: bold; display: none; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Chuyển đổi PDF sang Ảnh (ZIP)</h2>
    
    <div id="drop-zone">Kéo thả PDF hoặc click để chọn file</div>
    <input type="file" id="file-input" accept="application/pdf" style="display: none;">
    
    <div id="loading-msg" class="loading">Đang xử lý dữ liệu...</div>

    <div id="controls" class="controls">
        <button class="btn-download-all" onclick="downloadZip('all')">Tải tất cả (ZIP)</button>
        <hr>
        <div>
            <input type="text" id="custom-pages" placeholder="Ví dụ: 1, 3, 5-7">
            <button class="btn-download-custom" onclick="downloadZip('custom')">Tải trang đã chọn (ZIP)</button>
        </div>
    </div>

    <div id="output-container"></div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let pageCanvases = {}; // Lưu trữ canvas của từng trang

    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const controls = document.getElementById('controls');
    const outputContainer = document.getElementById('output-container');
    const loadingMsg = document.getElementById('loading-msg');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file || file.type !== 'application/pdf') return;
        
        outputContainer.innerHTML = '';
        pageCanvases = {};
        controls.style.display = 'none';
        loadingMsg.style.display = 'block';

        const arrayBuffer = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            await renderPage(i);
        }

        loadingMsg.style.display = 'none';
        controls.style.display = 'block';
    }

    async function renderPage(pageNum) {
        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.5 });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;

        // Lưu canvas vào object để dùng khi nén ZIP
        pageCanvases[pageNum] = canvas;

        const div = document.createElement('div');
        div.className = 'page-item';
        const label = document.createElement('div');
        label.className = 'page-label';
        label.innerText = `Trang ${pageNum}`;
        
        div.appendChild(canvas);
        div.appendChild(label);
        outputContainer.appendChild(div);
    }

    async function downloadZip(mode) {
        const zip = new JSZip();
        const imgFolder = zip.folder("images");
        let pagesToExport = [];

        if (mode === 'all') {
            pagesToExport = Object.keys(pageCanvases);
        } else {
            const input = document.getElementById('custom-pages').value;
            pagesToExport = parsePageSelection(input, pdfDoc.numPages);
        }

        if (pagesToExport.length === 0) {
            alert("Vui lòng chọn trang hợp lệ!");
            return;
        }

        loadingMsg.innerText = "Đang tạo file ZIP...";
        loadingMsg.style.display = 'block';

        pagesToExport.forEach(num => {
            const canvas = pageCanvases[num];
            const dataUrl = canvas.toDataURL('image/png').split(',')[1];
            imgFolder.file(`page-${num}.png`, dataUrl, {base64: true});
        });

        const content = await zip.generateAsync({type: "blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "pdf_pages.zip";
        link.click();
        
        loadingMsg.style.display = 'none';
        loadingMsg.innerText = "Đang xử lý dữ liệu...";
    }

    // Hàm xử lý chuỗi nhập trang (ví dụ: "1, 3, 5-7")
    function parsePageSelection(input, maxPages) {
        const pages = new Set();
        const parts = input.split(',');
        
        parts.forEach(part => {
            part = part.trim();
            if (part.includes('-')) {
                const [start, end] = part.split('-').map(Number);
                for (let i = start; i <= end; i++) {
                    if (i > 0 && i <= maxPages) pages.add(i);
                }
            } else {
                const num = Number(part);
                if (num > 0 && num <= maxPages) pages.add(num);
            }
        });
        return Array.from(pages).sort((a, b) => a - b);
    }
</script>

</body>
</html>
